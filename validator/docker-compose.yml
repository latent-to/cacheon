services:
  validator:
    build:
      context: ..
      dockerfile: validator/Dockerfile
    container_name: cacheon-validator
    restart: unless-stopped
    networks:
      - cacheon-internal
      - cacheon-egress
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CACHEON_STATE_DIR:-./state}:/app/state
      - ${BITTENSOR_DIR:-~/.bittensor}:/root/.bittensor
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - CACHEON_NETWORK=${CACHEON_NETWORK:-finney}
      - CACHEON_NETUID=${CACHEON_NETUID:-14}
      - CACHEON_WALLET_NAME=${CACHEON_WALLET_NAME:-default}
      - CACHEON_WALLET_HOTKEY=${CACHEON_WALLET_HOTKEY:-default}
      - CACHEON_MODEL_VOLUME=${CACHEON_MODEL_VOLUME:-/workspace/models/Qwen2.5-72B-Instruct}
      - CACHEON_BASELINE_IMAGE=${CACHEON_BASELINE_IMAGE:-vllm/vllm-openai:latest}
      - CACHEON_BASELINE_DIGEST=${CACHEON_BASELINE_DIGEST:-}
      - CACHEON_GPU_COUNT=${CACHEON_GPU_COUNT:-4}
      - CACHEON_STATE_DIR=/app/state
      - HF_TOKEN=${HF_TOKEN:-}

networks:
  cacheon-internal:
    name: cacheon-internal
    internal: true
  cacheon-egress:
    name: cacheon-egress
    driver: bridge
